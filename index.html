<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anuario Colaborativo 2026</title>
    <link rel="stylesheet" href="style-main.css">
</head>
<body>
    <header>
        <h1>Galería de Talentos</h1>
        <p>Haz clic en una tarjeta para ver el perfil individual</p>
    </header>

    <div id="container-anuario" class="grid-container">
        </div>

    <script>
        // CADA ALUMNO AGREGA SU OBJETO A ESTA LISTA
        const alumnos = [
          { nombre: "Brayan Tinoco", imagen: "image/XD.jpeg", archivo: "perfil-Alexander-tinoco.html" },
            { nombre: "Massiel Maravi", imagen: "https://i.pravatar.cc/150?u=massiel", archivo: "perfil-massiel-maravi.html" },
            { nombre: "Rocío Eguavel", imagen: "https://gatuario.com/wp-content/uploads/2024/08/cute-portrait-smoothhaired-tortoiseshell-cat-with-orangegreen-eyes-1024x683.jpg", archivo: "perfil_rocio.html" },
            { nombre: "Beck Melchor", imagen: "image/kjhfgd.jpg", archivo: "perfil-Beck.html" },
            { nombre: "Jose Alberto Chiuyari", 
            imagen: "proyectos/img/foto.jpg", 
            archivo: "perfil-jose.html" 
            },
             { nombre: "Marco De la cruz ", imagen: "image/perfil.png", archivo: "perfil-marcodtl.html" },
            { nombre: "Richard Santivañez", imagen: "image/richardsantivañez.jpg", archivo: "perfil-richard-santivañez.html" },
            { nombre: "Jheremy Leonardo", imagen: "//assets.change.org/photos/5/au/ae/QJaUaEIevzpEzZW-800x450-noPad.jpg?1589603359", archivo: "perfil-jheremyleo.html" }
        ];

        const container = document.getElementById('container-anuario');

        alumnos.forEach(alumno => {
            container.innerHTML += `
                <div class="card" onclick="window.location.href='proyectos/${alumno.archivo}'">
                    <img src="${alumno.imagen}" alt="${alumno.nombre}">
                    <h3>${alumno.nombre}</h3>
                    <span>Ver Perfil →</span>
                </div>
            `;
        });
    </script>
</body>
</html>
